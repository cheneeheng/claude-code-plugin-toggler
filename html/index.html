<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Plugin Toggler</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <h1>Skills Toggle</h1>
      <button class="btn-danger" id="btn-kill-server">Stop server</button>
      <div class="theme-toggle">
        <button class="theme-btn" data-theme="light">Light</button>
        <button class="theme-btn" data-theme="dark">Dark</button>
        <button class="theme-btn" data-theme="">System</button>
      </div>
    </div>
  </header>

  <div class="project-card" id="project-card">
    <div class="project-label">PROJECT</div>
    <div class="project-card-row">
      <span class="project-name" id="project-name"></span>
      <button class="project-change-btn" id="project-change-btn">Change &#9660;</button>
    </div>
    <div class="project-path" id="project-path"></div>
    <div class="project-picker-expand" id="project-picker-expand">
      <div class="project-picker-row">
        <input type="text" class="project-picker-input" id="project-path-input" />
        <button id="project-apply-btn">Apply</button>
      </div>
      <div class="project-picker-error" id="project-picker-error"></div>
    </div>
  </div>

  <div class="mock-notice" id="mock-notice" style="display:none">
    &#9888; Mock data &#8212; <code>~/.claude/plugins/installed_plugins.json</code> not found.
    <button onclick="document.getElementById('mock-notice').style.display='none'">&#10005;</button>
  </div>

  <div id="status" class="status">Loading plugins...</div>
  <div id="error" class="error-msg" style="display:none"></div>

  <div id="plugin-sections" style="display:none">
    <div id="local-section">
      <div class="section-title">Local plugins</div>
      <div class="plugin-list" id="local-list"></div>
    </div>
    <div id="global-section">
      <div class="section-title">Global plugins</div>
      <div class="plugin-list" id="global-list"></div>
    </div>
  </div>

  <div class="bulk-actions" id="bulk-actions" style="display:none">
    <button id="btn-enable-all">Enable all</button>
    <button id="btn-disable-all">Disable all</button>
  </div>

  <script>
    // ---- theme ----
    function setTheme(t) {
      if (t) document.documentElement.setAttribute("data-theme", t);
      else document.documentElement.removeAttribute("data-theme");
      localStorage.setItem("skills-theme", t ?? "");
      document.querySelectorAll(".theme-btn").forEach((b) => {
        b.classList.toggle("active", b.dataset.theme === t);
      });
    }
    (function initTheme() {
      const saved = localStorage.getItem("skills-theme");
      if (saved !== null) setTheme(saved);
    })();
    document.querySelectorAll(".theme-btn").forEach((b) => {
      b.addEventListener("click", () => setTheme(b.dataset.theme));
    });

    // ---- state ----
    let state = { local: [], global: [] };

    // ---- load ----
    async function load() {
      showStatus("Loading plugins...");
      try {
        const res = await fetch("/api/plugins");
        const data = await res.json();
        if (!res.ok) {
          const pathInfo = data.path ? ` (${data.path})` : "";
          throw new Error(`${data.error || `HTTP ${res.status}`}${pathInfo}`);
        }
        const projectRoot = data.project_root || "";
        const folderName = projectRoot
          ? projectRoot.replace(/\\/g, "/").split("/").filter(Boolean).pop() || projectRoot
          : "";
        document.getElementById("project-name").textContent = folderName;
        document.getElementById("project-path").textContent = projectRoot;
        document.getElementById("project-path-input").value = projectRoot;
        document.getElementById("mock-notice").style.display = data.mock ? "flex" : "none";
        state.local = data.local || [];
        state.global = data.global || [];
        renderPlugins();
      } catch (err) {
        showError(`Failed to load plugins: ${err.message}`);
      }
    }

    // ---- render ----
    function renderPlugins() {
      const sections = document.getElementById("plugin-sections");
      const bulk = document.getElementById("bulk-actions");

      if (state.local.length === 0 && state.global.length === 0) {
        showStatus("No plugins found for this project. Install plugins via Claude Code.");
        sections.style.display = "none";
        bulk.style.display = "none";
        return;
      }

      document.getElementById("status").style.display = "none";
      sections.style.display = "block";
      bulk.style.display = "flex";

      document.getElementById("local-section").style.display =
        state.local.length ? "block" : "none";
      document.getElementById("global-section").style.display =
        state.global.length ? "block" : "none";

      document.getElementById("local-list").innerHTML =
        state.local.map(localRowHtml).join("");
      document.getElementById("global-list").innerHTML =
        state.global.map(globalRowHtml).join("");

      document.querySelectorAll(".toggle").forEach((el) => {
        el.addEventListener("change", (e) =>
          toggle(e.target.dataset.id, e.target.checked, e.target)
        );
      });
    }

    function renderSkillsDisclosure(skills) {
      if (!skills || skills.length === 0) return "";
      const rows = skills.map((s) => `
        <div class="skill-row">
          <div class="skill-name">${esc(s.name)}</div>
          ${s.description ? `<div class="skill-description">${esc(s.description)}</div>` : ""}
        </div>`).join("");
      return `
        <div class="skills-disclosure">
          <button class="skills-toggle-btn" data-label="skill" onclick="toggleDisclosure(this)">
            ${skills.length} skill${skills.length !== 1 ? "s" : ""} &#9658;
          </button>
          <div class="skills-list">${rows}</div>
        </div>`;
    }

    function renderAgentsDisclosure(agents) {
      if (!agents || agents.length === 0) return "";
      const rows = agents.map((a) => `
        <div class="skill-row">
          <div class="skill-name">${esc(a.name)}</div>
          ${a.description ? `<div class="skill-description">${esc(a.description)}</div>` : ""}
        </div>`).join("");
      return `
        <div class="skills-disclosure">
          <button class="skills-toggle-btn" data-label="agent" onclick="toggleDisclosure(this)">
            ${agents.length} agent${agents.length !== 1 ? "s" : ""} &#9658;
          </button>
          <div class="skills-list">${rows}</div>
        </div>`;
    }

    function toggleDisclosure(btn) {
      const list = btn.nextElementSibling;
      const open = list.classList.toggle("is-open");
      const count = list.querySelectorAll(".skill-row").length;
      const label = btn.dataset.label || "skill";
      btn.textContent = `${count} ${label}${count !== 1 ? "s" : ""} ${open ? "▾" : "▸"}`;
    }

    function localRowHtml(p) {
      return `
        <div class="plugin-row" data-id="${esc(p.id)}">
          <div class="plugin-info">
            <span class="plugin-name">${esc(p.name)}</span>
            ${p.marketplace ? `<span class="marketplace-badge">@${esc(p.marketplace)}</span>` : ""}
            ${p.version ? `<span class="version-badge">v${esc(p.version)}</span>` : ""}
            ${renderSkillsDisclosure(p.skills)}
            ${renderAgentsDisclosure(p.agents)}
          </div>
          <div class="toggle-wrap">
            <input type="checkbox" class="toggle" data-id="${esc(p.id)}"
              ${p.enabled ? "checked" : ""} />
          </div>
        </div>`;
    }

    function globalRowHtml(p) {
      return `
        <div class="plugin-row" data-id="${esc(p.id)}">
          <div class="plugin-info">
            <span class="plugin-name">${esc(p.name)}</span>
            ${p.marketplace ? `<span class="marketplace-badge">@${esc(p.marketplace)}</span>` : ""}
            ${p.version ? `<span class="version-badge">v${esc(p.version)}</span>` : ""}
            ${renderSkillsDisclosure(p.skills)}
            ${renderAgentsDisclosure(p.agents)}
          </div>
        </div>`;
    }

    // ---- toggle ----
    async function toggle(id, enabled, el) {
      el.disabled = true;
      const prev = !enabled;
      const p = state.local.find((x) => x.id === id);
      if (p) p.enabled = enabled;
      try {
        const res = await fetch("/api/toggle", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, enabled }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
      } catch (err) {
        if (p) p.enabled = prev;
        el.checked = prev;
        showError(`Toggle failed: ${err.message}`);
      } finally {
        el.disabled = false;
      }
    }

    // ---- bulk ----
    async function bulkToggle(enabled) {
      const buttons = document.querySelectorAll(".bulk-actions button");
      buttons.forEach((b) => (b.disabled = true));
      for (const p of state.local) {
        if (p.enabled !== enabled) {
          const el = document.querySelector(`.toggle[data-id="${esc(p.id)}"]`);
          if (el) await toggle(p.id, enabled, el);
        }
      }
      buttons.forEach((b) => (b.disabled = false));
      renderPlugins();
    }

    // ---- project card ----
    document.getElementById("project-change-btn").addEventListener("click", () => {
      const expand = document.getElementById("project-picker-expand");
      const btn = document.getElementById("project-change-btn");
      const isOpen = expand.classList.toggle("is-open");
      btn.innerHTML = isOpen ? "Change &#9650;" : "Change &#9660;";
    });

    document.getElementById("project-apply-btn").addEventListener("click", async () => {
      const input = document.getElementById("project-path-input");
      const applyBtn = document.getElementById("project-apply-btn");
      const errEl = document.getElementById("project-picker-error");
      const newPath = input.value.trim();

      input.disabled = true;
      applyBtn.disabled = true;
      errEl.classList.remove("visible");

      try {
        const res = await fetch("/api/set-project", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ path: newPath }),
        });
        const data = await res.json();
        if (data.ok) {
          document.getElementById("project-picker-expand").classList.remove("is-open");
          document.getElementById("project-change-btn").innerHTML = "Change &#9660;";
          await load();
        } else {
          errEl.textContent = data.error || "Unknown error";
          errEl.classList.add("visible");
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add("visible");
      } finally {
        input.disabled = false;
        applyBtn.disabled = false;
      }
    });

    // ---- helpers ----
    function showStatus(html) {
      const s = document.getElementById("status");
      s.innerHTML = html;
      s.style.display = "block";
      document.getElementById("error").style.display = "none";
    }

    function showError(msg) {
      const e = document.getElementById("error");
      e.textContent = msg;
      e.style.display = "block";
      document.getElementById("status").style.display = "none";
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    document.getElementById("btn-enable-all").addEventListener("click", () => bulkToggle(true));
    document.getElementById("btn-disable-all").addEventListener("click", () => bulkToggle(false));

    document.getElementById("btn-kill-server").addEventListener("click", async () => {
      const btn = document.getElementById("btn-kill-server");
      btn.disabled = true;
      btn.textContent = "Stopping...";
      try {
        await fetch("/api/shutdown", { method: "POST" });
      } catch (_) {
        // connection drop on shutdown is expected
      }
      document.body.innerHTML =
        '<p style="padding:1.25rem;font-family:sans-serif;color:#e05c5c">Server stopped.</p>';
    });

    load();
  </script>
</body>
</html>
