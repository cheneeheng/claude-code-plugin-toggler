<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Toggle</title>
  <link rel="stylesheet" href="__STYLES_URI__" />
  <script>
    if (typeof acquireVsCodeApi !== "undefined") {
      document.documentElement.setAttribute("data-context", "vscode");
    }
  </script>
</head>
<body>
  <header>
    <h1>Skills Toggle</h1>
  </header>

  <div class="project-card" id="project-card">
    <div class="project-label">PROJECT</div>
    <div class="project-card-row">
      <span class="project-name" id="project-name"></span>
    </div>
    <div class="project-path" id="project-path"></div>
  </div>

  <div class="mock-notice" id="mock-notice" style="display:none">
    &#9888; Mock data &#8212; <code>~/.claude/plugins/installed_plugins.json</code> not found.
    <button onclick="document.getElementById('mock-notice').style.display='none'">&#10005;</button>
  </div>

  <div id="status" class="status">Loading plugins...</div>
  <div id="error" class="error-msg" style="display:none"></div>

  <div id="plugin-sections" style="display:none">
    <div id="local-section">
      <div class="section-title">Local plugins</div>
      <div class="plugin-list" id="local-list"></div>
    </div>
    <div id="global-section">
      <div class="section-title">Global plugins</div>
      <div class="plugin-list" id="global-list"></div>
    </div>
  </div>

  <div class="bulk-actions" id="bulk-actions" style="display:none">
    <div>
      <button id="btn-enable-all">Enable all</button>
      <button id="btn-disable-all">Disable all</button>
    </div>
    <button class="bulk-install-btn" id="btn-install-plugin" onclick="openInstallPanel()">+ Install plugin</button>
  </div>

  <div class="install-panel" id="install-panel"></div>

  <script>
    const vscodeApi = acquireVsCodeApi();
    let state = { local: [], global: [] };
    let marketplaces = [];
    let installPanelOpen = false;
    let selectedMarketplace = null;

    window.addEventListener("message", (event) => {
      const msg = event.data;
      if (msg.type === "load") {
        const projectRoot = msg.projectRoot || "";
        const folderName = projectRoot
          ? projectRoot.replace(/\\/g, "/").split("/").filter(Boolean).pop() || projectRoot
          : "";
        document.getElementById("project-name").textContent = folderName;
        document.getElementById("project-path").textContent = projectRoot;
        document.getElementById("mock-notice").style.display = msg.mock ? "flex" : "none";
        document.getElementById("error").style.display = "none";
        state.local = (msg.plugins && msg.plugins.local) || [];
        state.global = (msg.plugins && msg.plugins.global) || [];
        marketplaces = msg.marketplaces || [];
        // Restore selected marketplace if still valid
        if (selectedMarketplace && !marketplaces.find((m) => m.key === selectedMarketplace)) {
          selectedMarketplace = null;
        }
        renderPlugins();
        if (installPanelOpen) renderInstallPanel();
      } else if (msg.type === "error") {
        showError(msg.message);
      } else if (msg.type === "marketplaceRefreshStart") {
        const btn   = document.getElementById("marketplace-refresh-btn");
        const logEl = document.getElementById("marketplace-refresh-log");
        if (btn)   { btn.disabled = true; btn.textContent = "↻ Refreshing…"; }
        if (logEl) { logEl.textContent = ""; logEl.classList.add("is-open"); }
      } else if (msg.type === "marketplaceRefreshLine") {
        const logEl = document.getElementById("marketplace-refresh-log");
        if (logEl) { logEl.textContent += event.data.text; logEl.scrollTop = logEl.scrollHeight; }
      } else if (msg.type === "marketplaceRefreshDone") {
        const btn   = document.getElementById("marketplace-refresh-btn");
        const logEl = document.getElementById("marketplace-refresh-log");
        if (btn)   { btn.disabled = false; btn.textContent = "↻ Refresh"; }
        if (!event.data.ok && logEl) {
          logEl.textContent += `\nError: ${event.data.error}`;
        } else if (logEl) {
          logEl.classList.remove("is-open");
        }
      } else if (msg.type === "installStart") {
        const { id } = event.data;
        const btn   = document.getElementById(`mp-btn-${CSS.escape(id)}`);
        const logEl = document.getElementById(`mp-log-${CSS.escape(id)}`);
        if (btn)   { btn.textContent = "Installing…"; btn.disabled = true; }
        if (logEl) { logEl.textContent = ""; logEl.classList.add("is-open"); }
      } else if (msg.type === "installLine") {
        const { id, text } = event.data;
        const logEl = document.getElementById(`mp-log-${CSS.escape(id)}`);
        if (logEl) {
          logEl.textContent += text;
          logEl.scrollTop = logEl.scrollHeight;
        }
      } else if (msg.type === "installDone") {
        const { id, ok, error } = event.data;
        if (!ok) {
          const btn   = document.getElementById(`mp-btn-${CSS.escape(id)}`);
          const errEl = document.getElementById(`mp-err-${CSS.escape(id)}`);
          const logEl = document.getElementById(`mp-log-${CSS.escape(id)}`);
          if (btn)   { btn.textContent = "Install ↓"; btn.disabled = false; }
          if (logEl) logEl.classList.remove("is-open");
          if (errEl) { errEl.textContent = `Install failed: ${error}`; errEl.classList.add("visible"); }
        }
      }
    });

    function renderPlugins() {
      const sections = document.getElementById("plugin-sections");
      const bulk = document.getElementById("bulk-actions");

      if (state.local.length === 0 && state.global.length === 0) {
        showStatus("No plugins found for this project. Install plugins via Claude Code.");
        sections.style.display = "none";
        bulk.style.display = "none";
        return;
      }

      document.getElementById("status").style.display = "none";
      sections.style.display = "block";
      bulk.style.display = "flex";

      document.getElementById("local-section").style.display =
        state.local.length ? "block" : "none";
      document.getElementById("global-section").style.display =
        state.global.length ? "block" : "none";

      document.getElementById("local-list").innerHTML =
        state.local.map(localRowHtml).join("");
      document.getElementById("global-list").innerHTML =
        state.global.map(globalRowHtml).join("");

      document.querySelectorAll(".toggle").forEach((el) => {
        el.addEventListener("change", (e) => {
          const id = e.target.dataset.id;
          const enabled = e.target.checked;
          const p = state.local.find((x) => x.id === id);
          if (p) p.enabled = enabled;
          vscodeApi.postMessage({ type: "toggle", id, enabled });
        });
      });
    }

    function renderSkillsDisclosure(skills) {
      if (!skills || skills.length === 0) return "";
      const rows = skills.map((s) => `
        <div class="skill-row">
          <div class="skill-name">${esc(s.name)}</div>
          ${s.description ? `<div class="skill-description">${esc(s.description)}</div>` : ""}
        </div>`).join("");
      return `
        <div class="skills-disclosure">
          <button class="skills-toggle-btn" data-label="skill" onclick="toggleDisclosure(this)">
            ${skills.length} skill${skills.length !== 1 ? "s" : ""} &#9658;
          </button>
          <div class="skills-list">${rows}</div>
        </div>`;
    }

    function renderAgentsDisclosure(agents) {
      if (!agents || agents.length === 0) return "";
      const rows = agents.map((a) => `
        <div class="skill-row">
          <div class="skill-name">${esc(a.name)}</div>
          ${a.description ? `<div class="skill-description">${esc(a.description)}</div>` : ""}
        </div>`).join("");
      return `
        <div class="skills-disclosure">
          <button class="skills-toggle-btn" data-label="agent" onclick="toggleDisclosure(this)">
            ${agents.length} agent${agents.length !== 1 ? "s" : ""} &#9658;
          </button>
          <div class="skills-list">${rows}</div>
        </div>`;
    }

    function toggleDisclosure(btn) {
      const list = btn.nextElementSibling;
      const open = list.classList.toggle("is-open");
      const count = list.querySelectorAll(".skill-row").length;
      const label = btn.dataset.label || "skill";
      btn.textContent = `${count} ${label}${count !== 1 ? "s" : ""} ${open ? "▾" : "▸"}`;
    }

    function localRowHtml(p) {
      const control = p.installed === false
        ? `<button class="mp-install-btn" onclick="installLocalPlugin('${esc(p.id)}')">Install</button>`
        : `<input type="checkbox" class="toggle" data-id="${esc(p.id)}" ${p.enabled ? "checked" : ""} />`;
      return `
        <div class="plugin-row" data-id="${esc(p.id)}">
          <div class="plugin-info">
            <span class="plugin-name">${esc(p.name)}</span>
            ${p.marketplace ? `<span class="marketplace-badge">@${esc(p.marketplace)}</span>` : ""}
            ${p.version ? `<span class="version-badge">v${esc(p.version)}</span>` : ""}
            ${renderSkillsDisclosure(p.skills)}
            ${renderAgentsDisclosure(p.agents)}
          </div>
          <div class="toggle-wrap">
            ${control}
          </div>
        </div>`;
    }

    function globalRowHtml(p) {
      return `
        <div class="plugin-row" data-id="${esc(p.id)}">
          <div class="plugin-info">
            <span class="plugin-name">${esc(p.name)}</span>
            ${p.marketplace ? `<span class="marketplace-badge">@${esc(p.marketplace)}</span>` : ""}
            ${p.version ? `<span class="version-badge">v${esc(p.version)}</span>` : ""}
            ${renderSkillsDisclosure(p.skills)}
            ${renderAgentsDisclosure(p.agents)}
          </div>
        </div>`;
    }

    // ---- install panel ----
    function openInstallPanel() {
      installPanelOpen = true;
      if (!selectedMarketplace && marketplaces.length > 0) {
        selectedMarketplace = marketplaces[0].key;
      }
      renderInstallPanel();
      document.getElementById("install-panel").classList.add("is-open");
    }

    function closeInstallPanel() {
      installPanelOpen = false;
      document.getElementById("install-panel").classList.remove("is-open");
    }

    function triggerMarketplaceRefresh() {
      vscodeApi.postMessage({ type: "marketplaceRefresh" });
    }

    function renderInstallPanel() {
      const panel = document.getElementById("install-panel");

      if (marketplaces.length === 0) {
        panel.innerHTML = `
          <div class="install-panel-header">
            <span class="install-panel-title">Install plugin</span>
            <div style="display:flex;gap:8px;align-items:center;">
              <button class="marketplace-refresh-btn" id="marketplace-refresh-btn"
                      onclick="triggerMarketplaceRefresh()">&#8635; Refresh</button>
              <button class="install-panel-close" onclick="closeInstallPanel()">&#10005; Close</button>
            </div>
          </div>
          <div class="mp-install-log" id="marketplace-refresh-log"></div>
          <div class="status">No marketplaces configured. Add marketplaces via Claude Code before installing plugins.</div>`;
        return;
      }

      const options = marketplaces
        .map((m) => `<option value="${esc(m.key)}" ${m.key === selectedMarketplace ? "selected" : ""}>${esc(m.key)}</option>`)
        .join("");

      const mp = marketplaces.find((m) => m.key === selectedMarketplace);
      let pluginListHtml = "";
      if (mp) {
        if (mp.error) {
          pluginListHtml = `<div class="mp-install-error visible">${esc(mp.error)}</div>`;
        } else if (mp.plugins.length === 0) {
          pluginListHtml = `<div class="status">No plugins found in this marketplace.</div>`;
        } else {
          pluginListHtml = mp.plugins.map(renderMpPluginRow).join("");
        }
      }

      panel.innerHTML = `
        <div class="install-panel-header">
          <span class="install-panel-title">Install plugin</span>
          <div style="display:flex;gap:8px;align-items:center;">
            <button class="marketplace-refresh-btn" id="marketplace-refresh-btn"
                    onclick="triggerMarketplaceRefresh()">&#8635; Refresh</button>
            <button class="install-panel-close" onclick="closeInstallPanel()">&#10005; Close</button>
          </div>
        </div>
        <div class="mp-install-log" id="marketplace-refresh-log"></div>
        <div class="marketplace-select-row">
          <span class="marketplace-select-label">Marketplace</span>
          <select class="marketplace-select" onchange="selectedMarketplace = this.value; renderInstallPanel()">
            ${options}
          </select>
        </div>
        <div class="mp-plugin-list">${pluginListHtml}</div>`;
    }

    function renderMpPluginRow(p) {
      const scopeLabel = p.installed
        ? `<span class="install-status">&#10003; ${esc(p.installedScope)}</span>`
        : "";

      const keywords = (p.keywords || [])
        .map((k) => `<span class="mp-keyword">${esc(k)}</span>`)
        .join("");

      const btnLabel    = p.installed ? "Installed" : "Install &#8595;";
      const btnDisabled = p.installed ? "disabled" : "";
      const btnOnclick  = p.installed ? "" : `onclick="installPlugin('${esc(p.id)}')"`;

      return `
        <div class="mp-plugin-row" id="mp-row-${CSS.escape(p.id)}">
          <div class="mp-plugin-main">
            <span class="mp-plugin-name">${esc(p.name)}</span>
            ${p.version ? `<span class="version-badge">v${esc(p.version)}</span>` : ""}
            ${scopeLabel}
          </div>
          <div class="mp-install-col">
            <button class="mp-install-btn" id="mp-btn-${CSS.escape(p.id)}" ${btnDisabled} ${btnOnclick}>
              ${btnLabel}
            </button>
          </div>
          ${p.description ? `<div class="mp-plugin-description">${esc(p.description)}</div>` : ""}
          ${keywords ? `<div class="mp-keyword-list">${keywords}</div>` : ""}
          <div class="mp-install-error" id="mp-err-${CSS.escape(p.id)}"></div>
          <div class="mp-install-log" id="mp-log-${CSS.escape(p.id)}"></div>
        </div>`;
    }

    // ---- install actions (VSCode) ----
    async function installPlugin(id) {
      const btn = document.getElementById(`mp-btn-${CSS.escape(id)}`);
      if (btn) {
        btn.textContent = "Installing…";
        btn.disabled = true;
      }
      // Post to extension; full re-render comes via the next { type: 'load' } message
      vscodeApi.postMessage({ type: "install", id });
    }

    function installLocalPlugin(id) {
      vscodeApi.postMessage({ type: "install", id });
    }

    // ---- bulk ----
    function bulkToggle(enabled) {
      for (const p of state.local) {
        if (p.installed === false) continue;
        if (p.enabled !== enabled) {
          p.enabled = enabled;
          vscodeApi.postMessage({ type: "toggle", id: p.id, enabled });
        }
      }
      renderPlugins();
    }

    function showStatus(html) {
      const s = document.getElementById("status");
      s.innerHTML = html;
      s.style.display = "block";
      document.getElementById("error").style.display = "none";
    }

    function showError(msg) {
      const e = document.getElementById("error");
      e.textContent = msg;
      e.style.display = "block";
      document.getElementById("status").style.display = "none";
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    document.getElementById("btn-enable-all").addEventListener("click", () => bulkToggle(true));
    document.getElementById("btn-disable-all").addEventListener("click", () => bulkToggle(false));
  </script>
</body>
</html>
