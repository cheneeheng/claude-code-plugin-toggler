<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Toggle</title>
  <link rel="stylesheet" href="__STYLES_URI__" />
  <script>
    if (typeof acquireVsCodeApi !== "undefined") {
      document.documentElement.setAttribute("data-context", "vscode");
    }
  </script>
</head>
<body>
  <header>
    <h1>Skills Toggle</h1>
    <div class="project-path" id="project-path"></div>
  </header>

  <div class="mock-banner" id="mock-banner">
    Mock data — <code>~/.claude/plugins/installed_plugins.json</code> not found.
  </div>

  <div id="status" class="status">Loading plugins...</div>
  <div id="error" class="error-msg" style="display:none"></div>

  <div id="plugin-sections" style="display:none">
    <div id="local-section">
      <div class="section-title">Local</div>
      <div class="plugin-list" id="local-list"></div>
    </div>
    <div id="inherited-section">
      <div class="section-title">Inherited</div>
      <div class="plugin-list" id="inherited-list"></div>
    </div>
  </div>

  <div class="bulk-actions" id="bulk-actions" style="display:none">
    <button id="btn-enable-all">Enable all</button>
    <button id="btn-disable-all">Disable all</button>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    let plugins = [];

    window.addEventListener("message", (event) => {
      const msg = event.data;
      if (msg.type === "load") {
        plugins = msg.plugins || [];
        document.getElementById("project-path").textContent = msg.projectRoot || "";
        document.getElementById("mock-banner").style.display = msg.mock ? "block" : "none";
        document.getElementById("error").style.display = "none";
        renderPlugins();
      } else if (msg.type === "error") {
        showError(msg.message);
      }
    });

    function renderPlugins() {
      const sections = document.getElementById("plugin-sections");
      const bulk = document.getElementById("bulk-actions");

      if (plugins.length === 0) {
        showStatus("No plugins installed. Install plugins to <code>~/.claude/plugins/</code>.");
        sections.style.display = "none";
        bulk.style.display = "none";
        return;
      }

      document.getElementById("status").style.display = "none";
      sections.style.display = "block";
      bulk.style.display = "flex";

      const local = plugins.filter((p) => p.scope === "local");
      const inherited = plugins.filter((p) => p.scope !== "local");

      document.getElementById("local-section").style.display = local.length ? "block" : "none";
      document.getElementById("inherited-section").style.display = inherited.length ? "block" : "none";

      document.getElementById("local-list").innerHTML = local.map(localRowHtml).join("");
      document.getElementById("inherited-list").innerHTML = inherited.map(inheritedRowHtml).join("");

      document.querySelectorAll(".toggle").forEach((el) => {
        el.addEventListener("change", (e) => {
          const id = e.target.dataset.id;
          const enabled = e.target.checked;
          const p = plugins.find((x) => x.id === id);
          if (p) p.enabled = enabled;
          vscode.postMessage({ type: "toggle", id, enabled });
        });
      });

      document.querySelectorAll(".override-btn").forEach((el) => {
        el.addEventListener("click", (e) => {
          const id = e.target.dataset.id;
          const p = plugins.find((x) => x.id === id);
          if (!p) return;
          // Pin current state; extension handles confirmation and write.
          vscode.postMessage({ type: "toggle", id, enabled: p.enabled });
        });
      });
    }

    function localRowHtml(p) {
      return `
        <div class="plugin-row" data-id="${esc(p.id)}">
          <div class="plugin-info">
            <span class="plugin-name">${esc(p.name)}</span>
            ${p.marketplace ? `<span class="marketplace-badge">@${esc(p.marketplace)}</span>` : ""}
          </div>
          <div class="toggle-wrap">
            <input type="checkbox" class="toggle" data-id="${esc(p.id)}"
              ${p.enabled ? "checked" : ""} />
          </div>
        </div>`;
    }

    const INHERITED_TOOLTIP =
      "This plugin has no local setting. It is using the global default (enabled). " +
      "Click 'Override locally' to manage it in this project.";

    function inheritedRowHtml(p) {
      return `
        <div class="plugin-row inherited" data-id="${esc(p.id)}">
          <div class="plugin-info">
            <span class="plugin-name">${esc(p.name)}</span>
            ${p.marketplace ? `<span class="marketplace-badge">@${esc(p.marketplace)}</span>` : ""}
            <span class="inherited-badge" title="${esc(INHERITED_TOOLTIP)}">global default</span>
          </div>
          <div class="row-actions">
            <input type="checkbox" class="toggle" data-id="${esc(p.id)}"
              ${p.enabled ? "checked" : ""} disabled />
            <button class="override-btn" data-id="${esc(p.id)}">Override locally</button>
          </div>
        </div>`;
    }

    function bulkToggle(enabled) {
      for (const p of plugins.filter((x) => x.scope === "local")) {
        if (p.enabled !== enabled) {
          p.enabled = enabled;
          vscode.postMessage({ type: "toggle", id: p.id, enabled });
        }
      }
      renderPlugins();
    }

    function showStatus(html) {
      const s = document.getElementById("status");
      s.innerHTML = html;
      s.style.display = "block";
      document.getElementById("error").style.display = "none";
    }

    function showError(msg) {
      const e = document.getElementById("error");
      e.textContent = msg;
      e.style.display = "block";
      document.getElementById("status").style.display = "none";
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    document.getElementById("btn-enable-all").addEventListener("click", () => bulkToggle(true));
    document.getElementById("btn-disable-all").addEventListener("click", () => bulkToggle(false));
  </script>
</body>
</html>
